<!-- Mobile sidebar dialog -->
<el-dialog>
  <dialog id="cloud-sidebar" class="backdrop:bg-transparent lg:hidden">
    <el-dialog-backdrop class="fixed inset-0 bg-gray-900/80 transition-opacity duration-300 ease-linear data-closed:opacity-0"></el-dialog-backdrop>
    <div tabindex="0" class="fixed inset-0 flex focus:outline-none">
      <el-dialog-panel class="group/dialog-panel relative mr-16 flex w-full max-w-xs flex-1 transform transition duration-300 ease-in-out data-closed:-translate-x-full">
        <div class="absolute top-0 left-full flex w-16 justify-center pt-5 duration-300 ease-in-out group-data-closed/dialog-panel:opacity-0">
          <button type="button" command="close" commandfor="cloud-sidebar" class="-m-2.5 p-2.5">
            <span class="sr-only">Close sidebar</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6 text-white">
              <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        {% include "cloud/molecules/shell_sidebar_nav.html" %}
      </el-dialog-panel>
    </div>
  </dialog>
</el-dialog>

<!-- Desktop sidebar -->
<div class="hidden lg:fixed lg:inset-y-0 lg:z-50 lg:flex lg:w-72 lg:flex-col">
  {% include "cloud/molecules/shell_sidebar_nav.html" %}
</div>

<!-- Mobile-only sticky bar -->
{% include "cloud/molecules/shell_sidebar_mobile_bar.html" %}

<div class="lg:pl-72">
  <div class="sticky top-0 z-40 flex h-16 shrink-0 items-center gap-x-4 border-b border-white/10 bg-gray-900 px-4 shadow-xs sm:gap-x-6 sm:px-6 lg:px-8">
    <button type="button" command="show-modal" commandfor="cloud-sidebar" class="-m-2.5 p-2.5 text-gray-400 hover:text-white lg:hidden">
      <span class="sr-only">Open sidebar</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
    </button>
    <div aria-hidden="true" class="h-6 w-px bg-white/10 lg:hidden"></div>
    <div class="flex flex-1 gap-x-4 self-stretch lg:gap-x-6">
      <div class="flex-1"></div>
      <div class="flex items-center gap-x-4 lg:gap-x-6">
        {% include "cloud/molecules/shell_header_user_controls.html" %}
      </div>
    </div>
  </div>
  <main class="xl:pr-96">
    <div class="sf-container-{{ container_style }} py-10">
{% if container_style == "narrow" %}<div class="sf-container-narrow-inner">{% endif %}
