<div class="flex min-h-full flex-col">
  {% include "cloud/molecules/shell_multicolumn_header.html" %}
  <div class="mx-auto flex w-full max-w-7xl items-start gap-x-8 px-4 py-10 sm:px-6 lg:px-8">
    <!-- Left column: nav links -->
    <aside class="sticky top-8 hidden w-44 shrink-0 xl:block">
      <nav class="flex flex-col space-y-1">
        <a href="/app/" class="rounded-md px-3 py-2 text-sm font-medium {% if active_nav == 'dashboard' %}bg-white/5 text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %}">Dashboard</a>
        {% for schema in nav_schemas %}
        <a href="/app/{{ schema.url_name }}/entities" class="rounded-md px-3 py-2 text-sm font-medium {% if active_nav == schema.url_name %}bg-white/5 text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %}">{{ schema.label }}</a>
        {% endfor %}
      </nav>
    </aside>
    <!-- Main column -->
    <main class="flex-1">
      <div class="sf-container-{{ container_style }}">
{% if container_style == "narrow" %}<div class="sf-container-narrow-inner">{% endif %}
