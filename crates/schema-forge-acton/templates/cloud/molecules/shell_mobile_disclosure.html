<el-disclosure id="cloud-mobile-menu" hidden class="block md:hidden">
  <div class="space-y-1 px-2 pt-2 pb-3 sm:px-3">
    <a href="/app/" class="block rounded-md px-3 py-2 text-base font-medium {% if active_nav == 'dashboard' %}{% if nav_color_scheme == 'brand' %}bg-indigo-950/40 text-white{% else %}bg-gray-950/50 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-white hover:bg-indigo-700/75{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}{% endif %}"{% if active_nav == "dashboard" %} aria-current="page"{% endif %}>Dashboard</a>
    {% for schema in nav_schemas %}
    <a href="/app/{{ schema.url_name }}/entities" class="block rounded-md px-3 py-2 text-base font-medium {% if active_nav == schema.url_name %}{% if nav_color_scheme == 'brand' %}bg-indigo-950/40 text-white{% else %}bg-gray-950/50 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-white hover:bg-indigo-700/75{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}{% endif %}"{% if active_nav == schema.url_name %} aria-current="page"{% endif %}>{{ schema.label }}</a>
    {% endfor %}
  </div>
  {% if current_user %}
  <div class="border-t border-white/10 pt-4 pb-3">
    <div class="flex items-center px-5">
      <div class="shrink-0">
        <span class="flex size-10 items-center justify-center rounded-full bg-white/10 text-sm font-medium text-white">{{ current_user.display_name[:1] | upper }}</span>
      </div>
      <div class="ml-3">
        <div class="text-base/5 font-medium text-white">{{ current_user.display_name }}</div>
        <div class="text-sm font-medium {% if nav_color_scheme == 'brand' %}text-indigo-300{% else %}text-gray-400{% endif %}">{{ current_user.username }}</div>
      </div>
    </div>
    <div class="mt-3 space-y-1 px-2">
      <form method="post" action="/app/logout">
        <button type="submit" class="block w-full text-left rounded-md px-3 py-2 text-base font-medium {% if nav_color_scheme == 'brand' %}text-indigo-200 hover:bg-indigo-700/75 hover:text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %}">Sign out</button>
      </form>
    </div>
  </div>
  {% endif %}
</el-disclosure>
