<div class="flex grow flex-col items-center gap-y-5 overflow-y-auto {% if nav_color_scheme == 'brand' %}bg-indigo-800{% else %}bg-gray-900{% endif %} px-2 pb-4">
  <div class="flex h-16 shrink-0 items-center">
    {% if logo_url %}
    <img src="{{ logo_url }}" alt="{{ app_title }}" class="h-8 w-auto" />
    {% else %}
    <span class="text-lg font-bold text-white">{{ app_title[:2] | upper }}</span>
    {% endif %}
  </div>
  <nav class="flex flex-1 flex-col items-center">
    <ul role="list" class="flex flex-col items-center space-y-1">
      <li>
        <a href="/app/" class="group flex size-10 items-center justify-center rounded-lg {% if active_nav == 'dashboard' %}{% if nav_color_scheme == 'brand' %}bg-black/10 text-white{% else %}bg-white/5 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-indigo-100 hover:bg-black/10 hover:text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %}{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6"><path d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" stroke-linecap="round" stroke-linejoin="round" /></svg>
          <span class="sr-only">Dashboard</span>
        </a>
      </li>
      {% for schema in nav_schemas %}
      <li>
        <a href="/app/{{ schema.url_name }}/entities" class="group flex size-10 items-center justify-center rounded-lg {% if active_nav == schema.url_name %}{% if nav_color_scheme == 'brand' %}bg-black/10 text-white{% else %}bg-white/5 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-indigo-100 hover:bg-black/10 hover:text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %}{% endif %}">
          <span class="flex size-6 items-center justify-center rounded-md {% if nav_color_scheme == 'brand' %}border border-indigo-500 bg-indigo-700{% else %}border border-white/10 bg-white/5{% endif %} text-[0.625rem] font-medium">{{ schema.label[:1] | upper }}</span>
          <span class="sr-only">{{ schema.label }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</div>
