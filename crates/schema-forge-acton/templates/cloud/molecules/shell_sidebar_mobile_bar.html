<div class="sticky top-0 z-40 flex items-center gap-x-6 {% if nav_color_scheme == 'brand' %}bg-indigo-800{% else %}bg-gray-900{% endif %} px-4 py-4 shadow-xs sm:px-6 lg:hidden">
  <button type="button" command="show-modal" commandfor="cloud-sidebar" class="-m-2.5 p-2.5 {% if nav_color_scheme == 'brand' %}text-indigo-200{% else %}text-gray-400{% endif %}">
    <span class="sr-only">Open sidebar</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" /></svg>
  </button>
  <div class="flex-1 text-sm/6 font-semibold text-white">{{ app_title }}</div>
  {% if current_user %}
  <span class="flex size-8 items-center justify-center rounded-full bg-white/10 text-sm font-medium text-white">{{ current_user.display_name[:1] | upper }}</span>
  {% endif %}
</div>
