<div class="flex h-16 items-center justify-between">
  <!-- Left: logo + desktop nav links -->
  <div class="flex items-center">
    <div class="shrink-0">
      {% include "cloud/molecules/shell_logo.html" %}
    </div>
    <div class="hidden md:block">
      <div class="ml-10 flex items-baseline space-x-4">
        <a href="/app/" class="rounded-md px-3 py-2 text-sm font-medium {% if active_nav == 'dashboard' %}{% if nav_color_scheme == 'brand' %}bg-indigo-950/40 text-white{% else %}bg-gray-950/50 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-white hover:bg-indigo-700/75{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}{% endif %}"{% if active_nav == "dashboard" %} aria-current="page"{% endif %}>Dashboard</a>
        {% for schema in nav_schemas %}
        <a href="/app/{{ schema.url_name }}/entities" class="rounded-md px-3 py-2 text-sm font-medium {% if active_nav == schema.url_name %}{% if nav_color_scheme == 'brand' %}bg-indigo-950/40 text-white{% else %}bg-gray-950/50 text-white{% endif %}{% else %}{% if nav_color_scheme == 'brand' %}text-white hover:bg-indigo-700/75{% else %}text-gray-300 hover:bg-white/5 hover:text-white{% endif %}{% endif %}"{% if active_nav == schema.url_name %} aria-current="page"{% endif %}>{{ schema.label }}</a>
        {% endfor %}
        {% if nav_extra_html %}{{ nav_extra_html }}{% endif %}
      </div>
    </div>
  </div>
  <!-- Right: user dropdown (desktop) -->
  <div class="hidden md:block">
    <div class="ml-4 flex items-center md:ml-6">
      {% include "cloud/molecules/shell_header_user_controls.html" %}
    </div>
  </div>
  <!-- Mobile menu button -->
  <div class="-mr-2 flex md:hidden">
    <button type="button" command="--toggle" commandfor="cloud-mobile-menu" class="relative inline-flex items-center justify-center rounded-md p-2 {% if nav_color_scheme == 'brand' %}text-indigo-200 hover:bg-indigo-700/75 hover:text-white{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %} focus:outline-2 focus:outline-offset-2 focus:outline-white/50">
      <span class="absolute -inset-0.5"></span>
      <span class="sr-only">Open main menu</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6 in-aria-expanded:hidden">
        <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6 not-in-aria-expanded:hidden">
        <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
  </div>
</div>
