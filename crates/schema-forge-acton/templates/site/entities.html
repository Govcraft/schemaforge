{% extends "site/base.html" %}

{% block title %}{{ schema.name }} - SchemaForge{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{{ schema.name }}</h1>
        <p class="text-muted">{{ schema.fields | length }} fields</p>
    </div>
    <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/new" class="btn btn-primary">New {{ schema.name }}</a>
</div>

<div id="entity-table">
    {% include "shared/organisms/entity_list.html" %}
</div>
{% endblock %}
