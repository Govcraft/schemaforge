<div data-sf="field" data-field-name="{{ field.name }}" data-input-type="array">
    <label for="field-{{ field.name }}">{{ field.label }}{% if field.required %} *{% endif %}</label>
    <textarea id="field-{{ field.name }}" name="{{ field.name }}"
        placeholder="One value per line"
        {% if field.required %}required{% endif %}
    >{% if field.current_value %}{{ field.current_value }}{% endif %}</textarea>
</div>
