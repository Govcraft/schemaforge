<div class="sf-form-group">
    <label class="sf-form-label" for="field-{{ field.name }}">{{ field.label }}{% if field.required %} *{% endif %}</label>
    <textarea id="field-{{ field.name }}" name="{{ field.name }}" class="sf-form-input sf-form-textarea"
        {% for attr_name, attr_val in field.attrs %}{{ attr_name }}="{{ attr_val }}" {% endfor %}
        {% if field.required %}required{% endif %}
    >{% if field.current_value %}{{ field.current_value }}{% endif %}</textarea>
</div>
