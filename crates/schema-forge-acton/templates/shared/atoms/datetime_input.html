<fieldset>
    <legend class="text-sm font-medium text-white mb-1">{{ field.label }}{% if field.required %} <span class="text-red-400">*</span>{% endif %}</legend>
    <input type="datetime-local" id="{{ field.name }}" name="{{ field.name }}" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white ring-1 ring-inset ring-white/10 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-500"
        {% if field.current_value %}value="{{ field.current_value }}"{% endif %}
        {% if field.required %}required{% endif %}
    >
</fieldset>
