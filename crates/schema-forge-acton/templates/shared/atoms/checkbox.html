<fieldset>
    <input type="hidden" name="{{ field.name }}" value="false">
    <label class="flex items-center gap-2 cursor-pointer text-sm text-white">
        <input type="checkbox" id="{{ field.name }}" name="{{ field.name }}" value="true" class="size-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-600 focus:ring-offset-gray-900"
            {% if field.current_value %}{% if field.current_value == "true" %}checked{% endif %}{% endif %}
        >
        {{ field.label }}{% if field.required %} <span class="text-red-400">*</span>{% endif %}
    </label>
</fieldset>
