<fieldset>
    <legend class="text-sm font-medium text-white mb-1">{{ field.label }}{% if field.required %} <span class="text-red-400">*</span>{% endif %}</legend>
    <select id="{{ field.name }}" name="{{ field.name }}" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500"
        {% if field.multiple %}multiple size="5"{% endif %}
        {% if field.required %}required{% endif %}
        {% if field.relation_target %}
        hx-get="{{ url_prefix }}/{{ field.relation_target }}/relation-options/{{ field.name }}"
        hx-trigger="load"
        hx-target="this"
        hx-swap="innerHTML"
        {% endif %}
    >
        {% if not field.multiple %}<option value="">-- Select --</option>{% endif %}
        {% for opt_value, opt_label in field.options %}
        <option value="{{ opt_value }}"
            {% if field.current_value %}{% if field.current_value == opt_value %}selected{% endif %}{% endif %}
        >{{ opt_label }}</option>
        {% endfor %}
    </select>
</fieldset>
