<article data-sf="entity-detail" id="forge-detail-{{ entity.id }}">
    <header>
        <span data-sf="detail-title">{{ entity.display_value }}</span>
        <span data-sf="detail-id">{{ entity.id }}</span>
    </header>
    <dl>
        {% for field in entity.field_values %}
        <div data-sf="detail-field">
            <dt>{{ field.label }}</dt>
            <dd>{% if field.is_empty %}&mdash;{% else %}{% include "shared/atoms/field_display.html" %}{% endif %}</dd>
        </div>
        {% endfor %}
    </dl>
    <footer>
        <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           hx-get="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           hx-target="closest [id^='forge-detail-']" hx-swap="outerHTML">Edit</a>
        <button
            hx-delete="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}"
            hx-confirm="Delete this entity?"
            hx-target="closest [id^='forge-detail-']"
            hx-swap="outerHTML"
        >Delete</button>
    </footer>
</article>
