<div class="rounded-lg bg-white/5 ring-1 ring-white/10 p-6" id="forge-detail-{{ entity.id }}">
    <div class="flex items-center justify-between mb-4">
        <span class="text-lg font-bold text-white">{{ entity.display_value }}</span>
        <span class="text-sm text-gray-400">{{ entity.id }}</span>
    </div>
    <div class="grid grid-cols-[12rem_1fr] gap-x-4">
        {% for field in entity.field_values %}
        <div class="text-sm font-semibold text-gray-400 uppercase tracking-wider py-3 border-b border-white/5">{{ field.label }}</div>
        <div class="text-sm text-gray-300 py-3 border-b border-white/5">{% if field.is_empty %}<span class="text-gray-500">-</span>{% else %}{% include "shared/atoms/field_display.html" %}{% endif %}</div>
        {% endfor %}
    </div>
    <div class="flex gap-1.5 mt-4 pt-4 border-t border-white/10">
        <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           class="rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white hover:bg-white/20" hx-get="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           hx-target="closest .rounded-lg" hx-swap="outerHTML">Edit</a>
        <button class="rounded-md bg-red-500 px-2.5 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-red-400"
            hx-delete="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}"
            hx-confirm="Delete this entity?"
            hx-target="closest .rounded-lg"
            hx-swap="outerHTML"
        >Delete</button>
    </div>
</div>
