{% if not entities %}
<div class="sf-empty">
    <p>No entities yet.</p>
    <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/new" class="sf-btn sf-btn-primary">Create First Entity</a>
</div>
{% else %}
<table class="sf-entity-list" data-list-style="table">
    <thead class="sf-list-header">
        <tr>
            {% for field in schema.fields %}
            <th class="sf-list-header-cell" style="text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem;">{{ field.label }}</th>
            {% endfor %}
            <th class="sf-list-header-cell" style="text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; width: 120px;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for entity in entities %}
        {% include "shared/molecules/entity_row.html" %}
        {% endfor %}
    </tbody>
</table>
{% include "shared/molecules/pagination.html" %}
{% endif %}
