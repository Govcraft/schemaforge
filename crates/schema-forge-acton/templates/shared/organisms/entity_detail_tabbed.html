<div class="forge-detail-tabbed rounded-lg bg-white/5 ring-1 ring-white/10 p-6" id="forge-detail-{{ entity.id }}">
    <div class="flex items-center justify-between mb-4">
        <span class="text-lg font-bold text-white">{{ entity.display_value }}</span>
        <span class="text-sm text-gray-400">{{ entity.id }}</span>
    </div>
    <div class="forge-tabs flex border-b border-white/10 mb-4">
        <input type="radio" name="detail-tabs-{{ entity.id }}" id="tab-fields-{{ entity.id }}" class="forge-tab-radio hidden" checked>
        <label for="tab-fields-{{ entity.id }}" class="forge-tab-label cursor-pointer px-4 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white hover:border-gray-300">Fields</label>
        <div class="forge-tab-content hidden">
            {% for field in entity.field_values %}
            <div class="flex flex-col gap-1 py-3 border-b border-white/5">
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-wider">{{ field.label }}</div>
                <div class="text-sm text-gray-300">{% if field.is_empty %}<span class="text-gray-500">-</span>{% else %}{% include "shared/atoms/field_display.html" %}{% endif %}</div>
            </div>
            {% endfor %}
        </div>
        <input type="radio" name="detail-tabs-{{ entity.id }}" id="tab-meta-{{ entity.id }}" class="forge-tab-radio hidden">
        <label for="tab-meta-{{ entity.id }}" class="forge-tab-label cursor-pointer px-4 py-2 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white hover:border-gray-300">Metadata</label>
        <div class="forge-tab-content hidden">
            <div class="flex flex-col gap-1 py-3 border-b border-white/5">
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-wider">ID</div>
                <div class="text-sm text-gray-300"><code class="font-mono text-sm bg-white/5 px-1.5 py-0.5 rounded text-gray-300">{{ entity.id }}</code></div>
            </div>
        </div>
    </div>
    <div class="flex gap-1.5 mt-4 pt-4 border-t border-white/10">
        <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           class="rounded-md bg-white/10 px-3 py-2 text-sm font-semibold text-white hover:bg-white/20" hx-get="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           hx-target="closest .forge-detail-tabbed" hx-swap="outerHTML">Edit</a>
        <button class="rounded-md bg-red-500 px-2.5 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-red-400"
            hx-delete="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}"
            hx-confirm="Delete this entity?"
            hx-target="closest .forge-detail-tabbed"
            hx-swap="outerHTML"
        >Delete</button>
    </div>
</div>
