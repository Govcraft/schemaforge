<div class="sf-card-{{ card_style | default(value='basic') }} sf-card-divided" id="forge-detail-{{ entity.id }}">
    <div class="sf-card-header sf-detail-header flex items-center justify-between">
        <span class="sf-detail-title">{{ entity.display_value }}</span>
        <span class="sf-detail-id">{{ entity.id }}</span>
    </div>
    <div class="sf-card-body">
        {% for field in entity.field_values %}
        <div class="sf-detail-field">
            <div class="sf-detail-label uppercase tracking-wider">{{ field.label }}</div>
            <div class="sf-detail-value">{% if field.is_empty %}<span style="color: var(--sf-secondary)">-</span>{% else %}{% include "shared/atoms/field_display.html" %}{% endif %}</div>
        </div>
        {% endfor %}
    </div>
    <div class="sf-card-footer flex gap-1.5">
        <a href="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           class="sf-btn sf-btn-secondary" hx-get="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}/edit"
           hx-target="closest [id^='forge-detail-']" hx-swap="outerHTML">Edit</a>
        <button class="sf-btn sf-btn-danger sf-btn-xs"
            hx-delete="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity.id }}"
            hx-confirm="Delete this entity?"
            hx-target="closest [id^='forge-detail-']"
            hx-swap="outerHTML"
        >Delete</button>
    </div>
</div>
