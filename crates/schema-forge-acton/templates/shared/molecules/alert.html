{% if message %}
<div class="rounded-md p-4 text-sm ring-1 ring-inset {% if alert_type == "error" %}bg-red-500/10 text-red-400 ring-red-500/20{% elif alert_type == "success" %}bg-green-500/10 text-green-400 ring-green-500/20{% else %}bg-yellow-500/10 text-yellow-400 ring-yellow-500/20{% endif %}" role="alert">
    {{ message }}
</div>
{% endif %}
