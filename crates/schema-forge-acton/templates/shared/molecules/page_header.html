<div class="sf-page-header">
    <div>
        <h1 class="sf-page-title">{{ title }}</h1>
        {% if subtitle %}<p class="sf-page-subtitle">{{ subtitle }}</p>{% endif %}
    </div>
    {% if actions %}
    <div class="flex gap-2">
        {% for action in actions %}
        <a href="{{ action.url }}" class="{{ action.class }}">{{ action.label }}</a>
        {% endfor %}
    </div>
    {% endif %}
</div>
