<div class="page-header">
    <div>
        <h1 class="page-title">{{ title }}</h1>
        {% if subtitle %}<p class="page-subtitle">{{ subtitle }}</p>{% endif %}
    </div>
    {% if actions %}
    <div class="page-actions">
        {% for action in actions %}
        <a href="{{ action.url }}" class="{{ action.class }}">{{ action.label }}</a>
        {% endfor %}
    </div>
    {% endif %}
</div>
