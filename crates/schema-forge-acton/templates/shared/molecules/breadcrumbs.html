<nav class="sf-breadcrumbs" aria-label="Breadcrumb">
    <ol class="flex items-center gap-x-2">
        {% for crumb in breadcrumbs %}
        {% if not loop.first %}<li class="sf-breadcrumbs-sep"></li>{% endif %}
        <li>
            {% if crumb.url %}<a href="{{ crumb.url }}">{{ crumb.label }}</a>
            {% else %}<span style="color: var(--sf-text)">{{ crumb.label }}</span>{% endif %}
        </li>
        {% endfor %}
    </ol>
</nav>
