<div class="text-center py-12 text-gray-400">
    {% if icon %}<div class="text-4xl mb-3">{{ icon }}</div>{% endif %}
    <h3 class="text-lg font-semibold text-white mb-1">{{ title }}</h3>
    {% if description %}<p class="text-gray-400 mb-4">{{ description }}</p>{% endif %}
    {% if action_url %}
    <a href="{{ action_url }}" class="rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400">{{ action_label }}</a>
    {% endif %}
</div>
