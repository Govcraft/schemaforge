<div class="empty-state">
    {% if icon %}<div class="empty-state-icon">{{ icon }}</div>{% endif %}
    <h3 class="empty-state-title">{{ title }}</h3>
    {% if description %}<p class="empty-state-description">{{ description }}</p>{% endif %}
    {% if action_url %}
    <a href="{{ action_url }}" class="empty-state-action">{{ action_label }}</a>
    {% endif %}
</div>
