<div class="sf-empty">
    {% if icon %}<div class="text-4xl mb-3">{{ icon }}</div>{% endif %}
    <h3 class="text-lg font-semibold mb-1" style="color: var(--sf-text)">{{ title }}</h3>
    {% if description %}<p class="mb-4">{{ description }}</p>{% endif %}
    {% if action_url %}
    <a href="{{ action_url }}" class="sf-btn sf-btn-primary">{{ action_label }}</a>
    {% endif %}
</div>
