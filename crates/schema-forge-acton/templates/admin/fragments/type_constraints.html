{% if field_type == "text" %}
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Max length</label>
    <input type="number" name="field_{{ index }}_text_max_length" placeholder="No limit" min="1" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
</div>
{% elif field_type == "integer" %}
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Min</label>
    <input type="number" name="field_{{ index }}_integer_min" placeholder="No min" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
</div>
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Max</label>
    <input type="number" name="field_{{ index }}_integer_max" placeholder="No max" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
</div>
{% elif field_type == "float" %}
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Precision</label>
    <input type="number" name="field_{{ index }}_float_precision" placeholder="Any" min="0" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
</div>
{% elif field_type == "enum" %}
<div class="min-w-[100px] flex-1">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Variants (one per line)</label>
    <textarea name="field_{{ index }}_enum_variants" rows="3"
              placeholder="Active&#10;Inactive&#10;Pending"
              style="min-height: 60px;" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500"></textarea>
</div>
{% elif field_type == "relation" %}
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Target Schema</label>
    <input type="text" name="field_{{ index }}_relation_target" placeholder="PascalCase schema name" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
</div>
<div class="min-w-[100px]">
    <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Cardinality</label>
    <select name="field_{{ index }}_relation_cardinality" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
        <option value="one">One</option>
        <option value="many">Many</option>
    </select>
</div>
{% endif %}
