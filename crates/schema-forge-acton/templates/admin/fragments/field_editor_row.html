<div class="field-editor-row rounded-lg border border-white/10 bg-gray-950 px-4 py-3 mb-2.5 transition-[border-color,box-shadow] duration-200 hover:border-indigo-500/40 hover:shadow-[0_0_0_1px_rgba(99,102,241,0.08)]" id="field-row-{{ field.index }}">
    {% if field.old_name %}
    <input type="hidden" name="field_{{ field.index }}_old_name" value="{{ field.old_name }}">
    {% endif %}
    <div class="flex justify-between items-center gap-3 mb-2">
        <div class="flex gap-3 flex-1 min-w-0">
            <div class="flex-1 min-w-0">
                <input type="text" name="field_{{ field.index }}_name" value="{{ field.name }}"
                       placeholder="field_name (snake_case)" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 font-mono field-name">
            </div>
            <div class="w-[140px] shrink-0">
                <select name="field_{{ field.index }}_type" onchange="onTypeChange(this, {{ field.index }})" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
                    <option value="text" {% if field.field_type == "text" %}selected{% endif %}>Text</option>
                    <option value="richtext" {% if field.field_type == "richtext" %}selected{% endif %}>Rich Text</option>
                    <option value="integer" {% if field.field_type == "integer" %}selected{% endif %}>Integer</option>
                    <option value="float" {% if field.field_type == "float" %}selected{% endif %}>Float</option>
                    <option value="boolean" {% if field.field_type == "boolean" %}selected{% endif %}>Boolean</option>
                    <option value="datetime" {% if field.field_type == "datetime" %}selected{% endif %}>DateTime</option>
                    <option value="enum" {% if field.field_type == "enum" %}selected{% endif %}>Enum</option>
                    <option value="json" {% if field.field_type == "json" %}selected{% endif %}>JSON</option>
                    <option value="relation" {% if field.field_type == "relation" %}selected{% endif %}>Relation</option>
                </select>
            </div>
        </div>
        <div class="flex gap-0.5 shrink-0">
            <button type="button" class="rounded-md bg-white/10 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-white/20" onclick="moveFieldUp(this)" title="Move up">&#x2191;</button>
            <button type="button" class="rounded-md bg-white/10 px-2.5 py-1.5 text-xs font-semibold text-white hover:bg-white/20" onclick="moveFieldDown(this)" title="Move down">&#x2193;</button>
            <button type="button" class="rounded-md bg-red-500 px-2.5 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-red-400" onclick="removeFieldRow(this)" title="Remove">&#x2715;</button>
        </div>
    </div>

    <div class="flex gap-4 items-start">
        <div id="field-{{ field.index }}-constraints" class="flex gap-3 flex-1 flex-wrap">
            {% if field.field_type == "text" %}
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Max length</label>
                <input type="number" name="field_{{ field.index }}_text_max_length"
                       value="{% if field.text_max_length %}{{ field.text_max_length }}{% endif %}"
                       placeholder="No limit" min="1" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            </div>
            {% elif field.field_type == "integer" %}
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Min</label>
                <input type="number" name="field_{{ field.index }}_integer_min"
                       value="{% if field.integer_min %}{{ field.integer_min }}{% endif %}"
                       placeholder="No min" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            </div>
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Max</label>
                <input type="number" name="field_{{ field.index }}_integer_max"
                       value="{% if field.integer_max %}{{ field.integer_max }}{% endif %}"
                       placeholder="No max" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            </div>
            {% elif field.field_type == "float" %}
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Precision</label>
                <input type="number" name="field_{{ field.index }}_float_precision"
                       value="{% if field.float_precision %}{{ field.float_precision }}{% endif %}"
                       placeholder="Any" min="0" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            </div>
            {% elif field.field_type == "enum" %}
            <div class="min-w-[100px] flex-1">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Variants (one per line)</label>
                <textarea name="field_{{ field.index }}_enum_variants"
                          rows="3" placeholder="Active&#10;Inactive&#10;Pending"
                          style="min-height: 60px;" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">{{ field.enum_variants }}</textarea>
            </div>
            {% elif field.field_type == "relation" %}
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Target Schema</label>
                <input type="text" name="field_{{ field.index }}_relation_target"
                       value="{{ field.relation_target }}" placeholder="PascalCase schema name" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            </div>
            <div class="min-w-[100px]">
                <label class="block text-[0.6875rem] font-medium text-gray-400 mb-1 uppercase tracking-wider">Cardinality</label>
                <select name="field_{{ field.index }}_relation_cardinality" class="block w-full rounded-md bg-white/5 px-2.5 py-1 text-xs text-white ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500">
                    <option value="one" {% if field.relation_cardinality == "one" %}selected{% endif %}>One</option>
                    <option value="many" {% if field.relation_cardinality == "many" %}selected{% endif %}>Many</option>
                </select>
            </div>
            {% endif %}
        </div>

        <div class="flex gap-3 shrink-0 items-center pt-2">
            <label class="flex items-center gap-1.5 text-[0.8125rem] font-medium text-gray-400 cursor-pointer transition-colors hover:text-gray-300 has-[input:checked]:text-gray-200">
                <input type="checkbox" name="field_{{ field.index }}_required" value="true" class="size-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-600 focus:ring-offset-gray-900"
                       {% if field.required %}checked{% endif %}>
                Required
            </label>
            <label class="flex items-center gap-1.5 text-[0.8125rem] font-medium text-gray-400 cursor-pointer transition-colors hover:text-gray-300 has-[input:checked]:text-gray-200">
                <input type="checkbox" name="field_{{ field.index }}_indexed" value="true" class="size-4 rounded border-white/10 bg-white/5 text-indigo-600 focus:ring-indigo-600 focus:ring-offset-gray-900"
                       {% if field.indexed %}checked{% endif %}>
                Indexed
            </label>
        </div>
    </div>
</div>
