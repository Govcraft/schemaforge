{% if migration.is_empty %}
<p class="text-sm text-gray-400">No changes detected.</p>
{% else %}
<div class="flex flex-col gap-1.5">
    {% for step in migration.steps %}
    <div class="flex items-center gap-2 text-[0.8125rem] py-1">
        <span class="inline-flex items-center rounded-md px-1.5 py-0.5 text-xs font-semibold ring-1 ring-inset {{ step.safety_class }}">{{ step.safety }}</span>
        <span class="font-mono text-xs text-gray-300">{{ step.description }}</span>
    </div>
    {% endfor %}
</div>
<div class="mt-3 pt-2.5 border-t border-white/10 text-[0.8125rem] text-gray-400">
    Overall: <strong>{{ migration.overall_safety }}</strong>
</div>
{% endif %}
