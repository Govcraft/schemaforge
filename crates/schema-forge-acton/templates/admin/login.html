<!DOCTYPE html>
<!-- html class="h-full bg-gray-900" -->
<!-- body class="h-full" -->
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Login - SchemaForge Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/static/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>
<body class="h-full flex min-h-screen items-center justify-center bg-gray-900">
    <div class="rounded-lg bg-white/5 ring-1 ring-white/10 shadow-xl" style="width: 24rem;">
        <div class="p-6">
            <h2 class="text-lg font-semibold text-white text-2xl font-bold">SchemaForge</h2>
            <p class="text-gray-400">Admin Console Login</p>
            {% if error %}
            <div class="rounded-md bg-red-500/10 p-4 text-sm text-red-400 ring-1 ring-inset ring-red-500/20 mt-4">
                <span>{{ error }}</span>
            </div>
            {% endif %}
            <form method="post" action="/admin/login" class="mt-4">
                <div class="flex flex-col gap-1">
                    <label class="block text-sm font-medium text-white">Username</label>
                    <input type="text" name="username" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white ring-1 ring-inset ring-white/10 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-500" required autofocus>
                </div>
                <div class="flex flex-col gap-1 mt-4">
                    <label class="block text-sm font-medium text-white">Password</label>
                    <input type="password" name="password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-sm text-white ring-1 ring-inset ring-white/10 placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-500" required>
                </div>
                <div class="mt-6">
                    <button type="submit" class="rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 w-full">Login</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
