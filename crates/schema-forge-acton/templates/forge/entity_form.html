<div data-sf="entity-form" id="forge-form-{{ schema.url_name }}">
{% if errors %}
<div data-sf="errors">
    <ul>
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form
    {% if entity_id %}
    hx-put="{{ url_prefix }}/{{ schema.url_name }}/entities/{{ entity_id }}"
    {% else %}
    hx-post="{{ url_prefix }}/{{ schema.url_name }}/entities"
    {% endif %}
    hx-target="closest [data-sf='entity-form']"
    hx-swap="outerHTML"
>
    {% for field in fields %}
    {% include "admin/fragments/field_input.html" %}
    {% endfor %}

    <div data-sf="form-actions">
        <button type="submit">
            {% if entity_id %}Update{% else %}Create{% endif %}
        </button>
    </div>
</form>
</div>
