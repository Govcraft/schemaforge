name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        include:
          - backend: surrealdb
            suffix: surrealdb
          - backend: postgres
            suffix: postgres

    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain
        run: rustc --version && cargo --version

      - name: Build release binary (${{ matrix.backend }})
        run: cargo build --release --package schema-forge-cli --no-default-features --features ${{ matrix.backend }}

      - name: Package
        run: |
          cd target/release
          tar czf "../../schemaforge-${TAG_NAME}-x86_64-unknown-linux-gnu-${{ matrix.suffix }}.tar.gz" schemaforge
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: schemaforge-x86_64-unknown-linux-gnu-${{ matrix.suffix }}
          path: schemaforge-${{ github.ref_name }}-x86_64-unknown-linux-gnu-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: schemaforge-*
