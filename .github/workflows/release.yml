name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Rust toolchain
        run: rustc --version && cargo --version

      - name: Build release binary
        run: cargo build --release --package schema-forge-cli

      - name: Package
        run: |
          cd target/release
          tar czf "../../schema-forge-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz" schema-forge
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-forge-x86_64-unknown-linux-gnu
          path: schema-forge-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz

  release:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: schema-forge-*
