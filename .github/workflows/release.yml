name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: self-hosted

    runs-on: ${{ matrix.runner }}

    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: >
          cargo build --release
          --target ${{ matrix.target }}
          --package schema-forge-cli

      - name: Package
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../schema-forge-${TAG_NAME}-${{ matrix.target }}.tar.gz" schema-forge
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-forge-${{ matrix.target }}
          path: schema-forge-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: schema-forge-*
