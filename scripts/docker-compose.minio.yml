version: "3.8"

# Local MinIO used by the `file_field_e2e` integration test
# (`cargo nextest run --ignored -p schema-forge-acton --test file_field_e2e`).
#
# Start with:  docker compose -f scripts/docker-compose.minio.yml up -d
# Tear down:   docker compose -f scripts/docker-compose.minio.yml down -v
#
# Then point the test at it:
#   export SCHEMAFORGE_E2E_S3_ENDPOINT=http://127.0.0.1:9100
#   export SCHEMAFORGE_E2E_S3_ACCESS_KEY=minioadmin
#   export SCHEMAFORGE_E2E_S3_SECRET_KEY=minioadmin
#   export SCHEMAFORGE_E2E_S3_BUCKET=forge-e2e
#   cargo nextest run --workspace --run-ignored all file_field_e2e

services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --address ":9100" --console-address ":9101"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9100"  # S3 API
      - "9101:9101"  # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 12

  # One-shot job that creates the `forge-e2e` bucket after MinIO is ready.
  bucket-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9100 minioadmin minioadmin &&
      mc mb --ignore-existing local/forge-e2e &&
      echo 'bucket forge-e2e ready'
      "

volumes:
  minio-data:
